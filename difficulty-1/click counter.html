<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click counter</title>
</head>
<body>
    <center><h1>Click counter</h1>
    <p>Press the button and the count goes up.</p>
    <div class="value" id="value">0</div></center>
    <style>
        .value{
            font-size: 60px;
        }
    </style>
    <center>
        <button class="add" onclick="plus()">+ Click me!</button>
        <button class="reset" onclick="restart()">Reset</button>
    </center>
    <style>
        .add{
            background-color: rgb(127, 255, 0);
            color: aliceblue;
            border-width: 0px;
            height: 30px;
            width: 100px;
        }
        .reset{
            background-color: rgb(0, 0, 0);
            color: aliceblue;
            border-width: 0px;
            height: 30px;
            width: 100px;
        }
    </style>
    <script>
        let count=0;
        function plus(){
            count++;
            const element=document.getElementById('value');
            element.textContent=count;
        }
        function restart(){
            count=0;
            const element=document.getElementById('value');
            element.textContent=count;
        }
    </script>
</body>
</html>
